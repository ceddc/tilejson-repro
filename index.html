<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Swisstopo Style Repro - ArcGIS JS API 5.0</title>
  <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css" />
  <script type="module" src="https://js.arcgis.com/5.0/"></script>
  <style>
    html,
    body,
    #viewDiv {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: "Aptos", "Segoe UI", sans-serif;
    }

    #statusPanel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      width: min(420px, calc(100vw - 24px));
      padding: 12px 14px;
      border: 1px solid #8e9aaf;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.15);
      color: #1f2933;
    }

    #statusPanel[data-state="ok"] {
      border-color: #2d6a4f;
    }

    #statusPanel[data-state="error"] {
      border-color: #bc4749;
    }

    .label {
      margin-top: 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #52606d;
    }

    .label:first-child {
      margin-top: 0;
    }

    .value {
      margin-top: 4px;
      font-size: 14px;
      line-height: 1.4;
    }

    .buttonRow {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .modeButton {
      border: 1px solid #8e9aaf;
      border-radius: 999px;
      background: #f8fafc;
      color: #243b53;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .modeButton[aria-pressed="true"] {
      background: #243b53;
      border-color: #243b53;
      color: #ffffff;
    }

    .code {
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    #statusMessage {
      margin: 8px 0 0;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="viewDiv"></div>

  <section id="statusPanel" data-state="loading" aria-live="polite">
    <div class="label">API</div>
    <div class="value">ArcGIS Maps SDK for JavaScript 5.0</div>

    <div class="label">Mode</div>
    <div class="buttonRow" role="group" aria-label="Source mode">
      <button id="swisstopoStyleModeButton" class="modeButton" type="button" aria-pressed="true">CH basemap style</button>
      <button id="swisstopoDataCheckModeButton" class="modeButton" type="button" aria-pressed="false">CH data check</button>
    </div>

    <div class="label">Primary URL</div>
    <div id="primaryUrl" class="value code"></div>

    <div class="label">TileJSON source</div>
    <div id="tileJsonUrl" class="value code"></div>

    <div class="label">Mode note</div>
    <div id="modeNote" class="value"></div>

    <div class="label">Status</div>
    <div id="statusValue" class="value">loading</div>

    <pre id="statusMessage" class="value"></pre>
  </section>

  <script type="module">
    const swisstopoStyleUrl = "https://vectortiles.geo.admin.ch/styles/ch.swisstopo.basemap.vt/style.json";
    const swisstopoDataCheckStyleUrl = "./swisstopo.basemap.data-check.style.json";
    const swisstopoBaseTileJsonUrl = "https://vectortiles.geo.admin.ch/tiles/ch.swisstopo.base.vt/v1.0.0/tiles.json";
    const center = [7.4586, 46.9598];
    const zoom = 12;

    const modes = {
      swisstopoStyle: {
        buttonId: "swisstopoStyleModeButton",
        label: "CH basemap style",
        runtimeUrl: swisstopoStyleUrl,
        displayUrl: swisstopoStyleUrl,
        tileJsonDisplay: swisstopoBaseTileJsonUrl,
        note: "Loads the hosted swisstopo basemap style online."
      },
      swisstopoDataCheck: {
        buttonId: "swisstopoDataCheckModeButton",
        label: "CH data check",
        runtimeUrl: swisstopoDataCheckStyleUrl,
        displayUrl: swisstopoDataCheckStyleUrl,
        tileJsonDisplay: swisstopoBaseTileJsonUrl,
        note: "Loads the simple local diagnostic style with flat fills and lines only. Serve this page over http://localhost for this mode."
      }
    };

    const statusPanel = document.getElementById("statusPanel");
    const primaryUrlNode = document.getElementById("primaryUrl");
    const tileJsonUrlNode = document.getElementById("tileJsonUrl");
    const modeNoteNode = document.getElementById("modeNote");
    const statusValueNode = document.getElementById("statusValue");
    const statusMessageNode = document.getElementById("statusMessage");
    const modeButtons = {
      swisstopoStyle: document.getElementById("swisstopoStyleModeButton"),
      swisstopoDataCheck: document.getElementById("swisstopoDataCheckModeButton")
    };

    window.__status = {
      step: "loading",
      mode: "swisstopoStyle",
      message: "Waiting for the map to initialize."
    };

    let currentMode = "swisstopoStyle";
    let currentLayer = null;
    let loadToken = 0;

    function setStatus(step, message = "") {
      window.__status = { step, mode: currentMode, message };
      statusValueNode.textContent = step;
      statusMessageNode.textContent = message;

      if (step.endsWith("-ok")) {
        statusPanel.dataset.state = "ok";
      } else if (step.includes("error")) {
        statusPanel.dataset.state = "error";
      } else {
        statusPanel.dataset.state = "loading";
      }
    }

    function syncPanel(modeKey) {
      const mode = modes[modeKey];
      primaryUrlNode.textContent = mode.displayUrl;
      tileJsonUrlNode.textContent = mode.tileJsonDisplay;
      modeNoteNode.textContent = mode.note;

      Object.entries(modeButtons).forEach(([key, button]) => {
        button.setAttribute("aria-pressed", String(key === modeKey));
      });
    }

    const [Map, MapView, VectorTileLayer] = await Promise.all([
      $arcgis.import("@arcgis/core/Map.js"),
      $arcgis.import("@arcgis/core/views/MapView.js"),
      $arcgis.import("@arcgis/core/layers/VectorTileLayer.js")
    ]);

    const map = new Map();
    const view = new MapView({
      container: "viewDiv",
      map,
      center,
      zoom
    });

    async function loadMode(modeKey) {
      currentMode = modeKey;
      const token = ++loadToken;
      const mode = modes[modeKey];

      syncPanel(modeKey);
      setStatus("loading", `Loading ${mode.label}...`);

      if (currentLayer) {
        map.remove(currentLayer);
        currentLayer.destroy();
        currentLayer = null;
      }

      try {
        const layer = new VectorTileLayer({ url: mode.runtimeUrl });
        currentLayer = layer;
        map.add(layer);

        await layer.when();
        if (token !== loadToken) {
          return;
        }
        console.log("LAYER_OK", mode.runtimeUrl);
        setStatus("layer-ok", "Layer metadata loaded.");

        await view.when();
        await view.whenLayerView(layer);
        if (token !== loadToken) {
          return;
        }
        console.log("LAYERVIEW_OK", mode.runtimeUrl);
        setStatus("layerview-ok", "Layer view created and drawing.");
      } catch (error) {
        if (token !== loadToken) {
          return;
        }
        const message = error?.message || String(error);
        console.error("LAYER_FAIL", mode.runtimeUrl, error);
        setStatus("layer-error", message);
      }
    }

    modeButtons.swisstopoStyle.addEventListener("click", () => loadMode("swisstopoStyle"));
    modeButtons.swisstopoDataCheck.addEventListener("click", () => loadMode("swisstopoDataCheck"));

    syncPanel(currentMode);
    loadMode(currentMode);
  </script>
</body>
</html>
